server:
  port: 8086
  tomcat:
    max-http-form-post-size: 6MB
    max-swallow-size: 6MB
  error:
    include-message: always
    include-binding-errors: always

spring:
  # Secrets locaux : creez application-local.yml (non versionne) avec vos cles Google / SMTP / reCAPTCHA
  config:
    import: optional:classpath:application-local.yml
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  application:
    name: frontend-service
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:postgresql://localhost:55432/hirehub_auth
    username: hirehub
    password: hirehub
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  rabbitmq:
    host: localhost
    port: 5672
    username: hirehub
    password: hirehub

  # Google OAuth : variables d'environnement ou fichier application-local.yml (non versionne)
  # URI redirection Console : http://localhost:8086/login/oauth2/code/google
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
            scope: openid, profile, email

  # SMTP : definir MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD ou application-local.yml
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

hirehub:
  api-base-url: http://localhost:8081
  offre-service-base-url: http://localhost:8089/offre-service
  candidature-service-base-url: http://localhost:8089/candidature-service
  entretien-service-base-url: http://localhost:8089/entretien-service
  public-base-url: http://localhost:8086
  upload-dir: ./data/uploads
  jwt:
    secret: ${HIREHUB_JWT_SECRET:hirehub-local-dev-jwt-secret-change-me-32b}
    expiration-seconds: ${HIREHUB_JWT_EXPIRATION_SECONDS:3600}
  recaptcha:
    site-key: ${RECAPTCHA_SITE_KEY:}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connect-timeout: 1000
        read-timeout: 8000
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 5
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80
        register-health-indicator: true
    instances:
      candidature-service:
        base-config: default
      offre-service:
        base-config: default
      entretien-service:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
    instances:
      candidature-service:
        base-config: default
      offre-service:
        base-config: default
      entretien-service:
        base-config: default
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 10
        max-wait-duration: 500ms
    instances:
      candidature-service:
        base-config: default
      offre-service:
        base-config: default
      entretien-service:
        base-config: default

management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus, circuitbreakers, circuitbreakerevents
