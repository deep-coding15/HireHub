<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Logo SVG animé — 3 variantes (ids uniques par emplacement) -->
<svg th:fragment="logoNav" class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
        <linearGradient id="hhLogoGradNav" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#c4b5fd"/>
            <stop offset="50%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#5b21b6"/>
        </linearGradient>
        <linearGradient id="hhRingGradNav" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#e9d5ff"/>
            <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
    </defs>
    <circle class="logo-ring" cx="24" cy="24" r="22" stroke="url(#hhRingGradNav)" stroke-width="2.5" stroke-dasharray="8 6" fill="none" opacity="0.9"/>
    <g class="logo-pulse">
        <rect x="14" y="12" width="6" height="24" rx="2" fill="url(#hhLogoGradNav)"/>
        <rect x="28" y="12" width="6" height="24" rx="2" fill="url(#hhLogoGradNav)"/>
        <path d="M20 24h8" stroke="url(#hhLogoGradNav)" stroke-width="5" stroke-linecap="round"/>
    </g>
</svg>
