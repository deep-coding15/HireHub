<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<footer th:fragment="footer" class="hh-footer">
    <div class="container">
        <div class="row g-4 mb-4">
            <div class="col-6 col-lg-3">
                <div class="hh-footer-brand mb-2">
                    <span th:replace="~{fragments/logo :: logoFt}"></span>
                    <div class="fw-semibold">HireHub</div>
                </div>
                <p class="hh-footer-tagline mb-0">L’ATS qui simplifie le recrutement : un parcours fluide pour les talents et les équipes RH.</p>
            </div>
            <div class="col-6 col-lg-3">
                <h6 class="hh-footer-title">Candidats</h6>
                <div class="d-flex flex-column gap-1">
                    <a th:href="@{/offres}">Parcourir les offres</a>
                    <a th:href="@{/register/candidat}">Créer un compte</a>
                    <a th:href="@{/candidat/dashboard}">Mon espace</a>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <h6 class="hh-footer-title">Entreprises</h6>
                <div class="d-flex flex-column gap-1">
                    <a th:href="@{/register/recruteur}">Inscription recruteur</a>
                    <a th:href="@{/recruteur/dashboard}">Espace recruteur</a>
                    <a th:href="@{/recruteur/offres}">Mes offres</a>
                    <a th:href="@{/support}">Demander une démo</a>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <h6 class="hh-footer-title">Légal</h6>
                <div class="d-flex flex-column gap-1">
                    <a th:href="@{/confidentialite}">Confidentialité</a>
                    <a th:href="@{/faq}">FAQ</a>
                    <a th:href="@{/support}">Support</a>
                    <a th:href="@{/login}">Connexion</a>
                </div>
            </div>
        </div>
        <div class="hh-footer-bottom text-center">
            <span>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> HireHub</span>
        </div>
    </div>
</footer>
</body>
</html>
