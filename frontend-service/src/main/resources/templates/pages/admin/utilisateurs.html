<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Utilisateurs</title>
</head>
<body>
<section layout:fragment="content" class="page-inner">

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">

        <div class="hh-table-wrap">

                <tr>
                    <th>Email</th>
                    <th>Nom</th>
                    <th>Role</th>
                    <th>Statut</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td>admin@hirehub.local</td>
                    <td>Admin</td>
                    <td><span class="badge bg-dark rounded-pill">ADMIN</span></td>
                    <td><span class="badge bg-success rounded-pill">Actif</span></td>
                    <td><button type="button" class="btn btn-sm btn-outline-secondary rounded-pill">Modifier</button></td>
                </tr>
                <tr>
                    <td>rh@entreprise.ma</td>
                    <td>Service RH</td>
                    <td><span class="badge rounded-pill" style="background: #ede9fe; color: #5b21b6;">RECRUTEUR</span></td>
                    <td><span class="badge bg-success rounded-pill">Actif</span></td>
                    <td><button type="button" class="btn btn-sm btn-outline-secondary rounded-pill">Modifier</button></td>
                </tr>
                <tr>
                    <td>candidat@email.com</td>
                    <td>Jean Dupont</td>
                    <td><span class="badge bg-secondary rounded-pill">CANDIDAT</span></td>
                    <td><span class="badge bg-success rounded-pill">Actif</span></td>
                    <td><button type="button" class="btn btn-sm btn-outline-secondary rounded-pill">Modifier</button></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

</html>
