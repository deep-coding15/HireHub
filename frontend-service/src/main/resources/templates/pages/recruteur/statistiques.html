<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Statistiques</title>
</head>
<body>
<section layout:fragment="content" class="page-inner">
    <th:block th:insert="~{fragments/recruteur-lock :: top}"/>
    <div th:classappend="${uiRecruteurPending} ? 'hh-recruteur-locked'">
    <div class="container">
        <h1 class="page-hero-title">Statistiques par offre</h1>
        <p class="page-hero-sub">Vue d'ensemble de votre activité de recrutement.</p>

        <div class="alert alert-warning border-0 shadow-sm" th:if="${apiError}">
            Impossible de calculer les statistiques pour le moment.
        </div>

        <div class="hh-card mb-4">
            <h2 class="h6 text-uppercase mb-3" style="color: var(--hh-violet-800);">Candidatures par offre</h2>
            <div th:style="|height: ${#lists.size(stats.offreLabels) * 48 + 80}px; min-height: 160px; max-height: 600px;|">
                <canvas id="chartRecruteur"></canvas>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="hh-kpi">
                    <div class="hh-kpi-value" th:text="${stats.offresCount}">0</div>
                    <div class="hh-kpi-label">Offres totales</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="hh-kpi">
                    <div class="hh-kpi-value" th:text="${stats.candidaturesCount}">0</div>
                    <div class="hh-kpi-label">Candidatures</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="hh-kpi">
                    <div class="hh-kpi-value" th:text="${stats.offresPubliees}">0</div>
                    <div class="hh-kpi-label">Offres publiees</div>
                </div>
            </div>
        </div>
    </div>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            const el = document.getElementById('chartRecruteur');
            if (!el || typeof Chart === 'undefined') return;
            const rawLabels = /*[[${stats.chartLabelsJson}]]*/ [];
            const data      = /*[[${stats.chartDataJson}]]*/ [];
            // Tronquer les labels longs pour les barres horizontales
            const labels = rawLabels.map(l => l.length > 40 ? l.substring(0, 38) + '…' : l);
            new Chart(el, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Candidatures',
                        data: data,
                        backgroundColor: 'rgba(109, 40, 217, 0.65)',
                        borderRadius: 6
                    }]
                },
                options: {
                    indexAxis: 'y',          // barres horizontales → labels sur l'axe Y
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: { precision: 0 },
                            grid: { color: 'rgba(76,29,149,0.08)' }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { font: { size: 13 } }
                        }
                    }
                }
            });
        });
    </script>
    </div>
</section>
</body>
</html>
