<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Entretiens</title>
</head>
<body>
<section layout:fragment="content" class="page-inner">
    <th:block th:insert="~{fragments/recruteur-lock :: top}"/>
    <div th:classappend="${uiRecruteurPending} ? 'hh-recruteur-locked'">
    <div class="container">
        <h1 class="page-hero-title">Entretiens</h1>
        <p class="page-hero-sub">Vos entretiens planifiés avec les candidats.</p>

        <div class="alert alert-warning border-0 shadow-sm" th:if="${apiError}">
            Impossible de charger les entretiens pour le moment.
        </div>

        <div class="hh-table-wrap">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Candidature</th>
                    <th>Candidat</th>
                    <th>Date</th>
                    <th>Lieu / visio</th>
                    <th>Type</th>
                    <th>Statut</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(entretiens)}">
                    <td colspan="6" class="text-center text-muted py-4">Aucun entretien en base.</td>
                </tr>
                <tr th:each="e : ${entretiens}">
                    <td th:text="${e.candidatureId}">candidature</td>
                    <td th:text="${e.candidatId}">candidat</td>
                    <td th:text="${e.dateHeureFormatted}">date</td>
                    <td th:text="${e.lieuOuVisio}">lieu</td>
                    <td th:text="${e.type}">type</td>
                    <td th:text="${e.status}">statut</td>
                </tr>
                </tbody>
            </table>
        </div>
        <p class="text-muted small mt-3">
            Aucun entretien planifié pour le moment.
        </p>
    </div>
    </div>
</section>
</body>
</html>
