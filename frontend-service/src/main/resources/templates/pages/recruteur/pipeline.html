<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Pipeline</title>
</head>
<body>
<section layout:fragment="content" class="page-inner">
    <th:block th:insert="~{fragments/recruteur-lock :: top}"/>
    <div th:classappend="${uiRecruteurPending} ? 'hh-recruteur-locked'">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a th:href="@{/recruteur/offres}">Mes offres</a></li>
                <li class="breadcrumb-item active">Offre #<span th:text="${offreId}">—</span></li>
            </ol>
        </nav>
        <h1 class="page-hero-title">Pipeline</h1>
        <p class="page-hero-sub">Suivez les candidatures reçues pour cette offre.</p>

        <div class="alert alert-danger border-0 shadow-sm" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-success border-0 shadow-sm" th:if="${success}" th:text="${success}"></div>

        <div class="hh-table-wrap">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Candidat</th>
                    <th>Date de soumission</th>
                    <th>CV</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(candidatures)}">
                    <td colspan="5" class="text-center text-muted py-4">Aucune candidature pour cette offre.</td>
                </tr>
                <tr th:each="c : ${candidatures}">
                    <td th:text="${c.candidatId}">—</td>
                    <td th:text="${c.dateSoumissionFormatted}">—</td>
                    <td>
                        <a th:if="${c.hasCv()}"
                           th:href="@{/recruteur/candidature/{id}/download(id=${c.candidatureId},type=cv)}"
                           class="btn btn-sm btn-outline-secondary">CV</a>
                        <span th:unless="${c.hasCv()}" class="text-muted">—</span>
                    </td>
                    <td>
                        <span th:class="${c.statusBadgeClass}" th:text="${c.statusLabel}"></span>
                    </td>
                    <td>
                        <a th:href="@{/recruteur/candidature/{id}(id=${c.candidatureId})}"
                           class="btn btn-sm btn-outline-primary rounded-pill me-1">Détails</a>
                        <form th:action="@{/recruteur/candidature/{id}/statut(id=${c.candidatureId})}"
                              method="POST" class="d-inline">
                            <select name="status" class="form-select form-select-sm d-inline-block w-auto"
                                    onchange="this.form.submit()">
                                <option value="">Changer…</option>
                                <option value="EN_COURS">En cours</option>
                                <option value="ENTRETIEN">Entretien</option>
                                <option value="ACCEPTEE">Acceptée</option>
                                <option value="REFUSEE">Refusée</option>
                            </select>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    </div>
</section>
</body>
</html>
