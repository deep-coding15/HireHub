<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Espace recruteur</title>
</head>
<body>
<section layout:fragment="content" class="page-inner">
    <th:block th:insert="~{fragments/recruteur-lock :: top}"/>
    <div th:classappend="${uiRecruteurPending} ? 'hh-recruteur-locked'">
    <div class="container">
        <h1 class="page-hero-title">Tableau de bord recruteur</h1>
        <p class="page-hero-sub">Tableau de bord de votre activité recruteur.</p>

        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="hh-kpi">
                    <div class="hh-kpi-value" th:text="${offresCount}">0</div>
                    <div class="hh-kpi-label">Offres (toutes)</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="hh-card">
                    <h2 class="h5 mb-3" style="color: var(--hh-violet-900);">Vos offres</h2>
                    <div class="hh-table-wrap">
                        <table class="table table-sm mb-0">
                            <thead>
                            <tr>
                                <th>Intitule</th>
                                <th>Ville</th>
                                <th>Statut</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(offresRecentes)}">
                                <td colspan="4" class="text-muted text-center py-3">Aucune offre. Creez-en une.</td>
                            </tr>
                            <tr th:each="offre : ${offresRecentes}">
                                <td th:text="${offre.titre}">Titre</td>
                                <td th:text="${offre.ville}">Ville</td>
                                <td th:text="${offre.statut}">BROUILLON</td>
                                <td>
                                    <a th:href="@{/recruteur/pipeline/{id}(id=${offre.id})}">Pipeline</a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="hh-card">
                    <h2 class="h5 mb-3" style="color: var(--hh-violet-900);">Actions</h2>
                    <div class="d-grid gap-2">
                        <a class="btn hh-btn-primary rounded-pill" th:href="@{/recruteur/offres/nouvelle}">Nouvelle offre</a>
                        <a class="btn btn-outline-primary rounded-pill" th:href="@{/recruteur/offres}">Gerer les offres</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</section>
</body>
</html>
