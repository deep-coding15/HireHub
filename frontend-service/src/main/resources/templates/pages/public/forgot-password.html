<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Mot de passe oublie</title>
</head>
<body>
<section layout:fragment="content" class="page-inner">
    <div class="container" style="max-width: 520px;">
        <h1 class="page-hero-title text-center">Mot de passe oublie</h1>
        <p class="page-hero-sub text-center">Entrez votre email pour recevoir un <strong>code &agrave; 6 chiffres</strong> (valide 15 minutes).</p>
        <div class="alert alert-warning" th:if="${param.invalid}" role="alert">
            Code ou email invalide. Demandez un nouveau code ci-dessous.
        </div>
        <div class="hh-card">
            <form th:action="@{/forgot-password}" method="post">
                <div class="mb-3">
                    <label class="hh-form-label" for="resetEmail">Email</label>
                    <input id="resetEmail" name="email" type="email" class="form-control rounded-3 border-0 shadow-sm" required autocomplete="email">
                </div>
                <button type="submit" class="btn hh-btn-primary w-100 rounded-pill">Envoyer le code</button>
            </form>
            <p class="small text-muted mt-3 mb-0 text-center">
                <a th:href="@{/reset-password}">J&rsquo;ai d&eacute;j&agrave; un code &mdash; saisir nouveau mot de passe</a>
            </p>
            <p class="small text-muted mt-2 mb-0 text-center">
                Vous vous souvenez du mot de passe ? <a th:href="@{/login}">Retour connexion</a>
            </p>
        </div>
    </div>
</section>
</body>
</html>
