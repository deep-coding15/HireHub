<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Postuler</title>
</head>
<body>
<section layout:fragment="content" class="page-inner">
    <div class="container" style="max-width: 640px;">
        <h1 class="page-hero-title">Candidature</h1>
        <p class="page-hero-sub">Complétez votre dossier pour cette offre.</p>

        <div class="alert alert-danger border-0 shadow-sm" th:if="${postulerError}" th:text="${postulerError}"></div>

        <!-- Candidature déjà soumise : informer avant le formulaire -->
        <div th:if="${alreadyApplied}" class="hh-card border-warning mb-4" style="border-left: 4px solid #f59e0b;">
            <div class="d-flex align-items-start gap-3">
                <span style="font-size:2rem; line-height:1;">⚠️</span>
                <div>
                    <h2 class="h5 fw-bold mb-1" style="color:#92400e;">Candidature déjà soumise</h2>
                    <p class="mb-2 text-muted small">
                        Vous avez déjà postulé à cette offre. Retrouvez votre dossier dans vos candidatures.
                    </p>
                    <a href="/candidat/mes-candidatures" class="btn btn-sm btn-outline-warning rounded-pill">
                        Voir mes candidatures
                    </a>
                </div>
            </div>
        </div>

        <form th:unless="${alreadyApplied}" class="hh-card" method="post" th:action="@{/offres/{id}/postuler(id=${offreId})}" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="hh-form-label" for="lettre">Lettre de motivation</label>
                <textarea id="lettre" name="lettre" class="form-control rounded-3 border-0 shadow-sm" rows="6"
                          placeholder="Expliquez votre motivation…"></textarea>
            </div>
            <div class="mb-4">
                <label class="hh-form-label" for="cv">CV (PDF, max. 5 Mo)</label>
                <input type="file" id="cv" name="cv" class="form-control rounded-3 border-0 shadow-sm" accept=".pdf" required/>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <button type="submit" class="btn hh-btn-primary rounded-pill">Envoyer ma candidature</button>
                <a class="btn btn-outline-secondary rounded-pill" th:href="@{/offres/{id}(id=${offreId})}">Annuler</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
