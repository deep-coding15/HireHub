<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Detail de l'offre</title>
</head>
<body>
<section layout:fragment="content" class="page-inner">
    <div class="container">
        <nav aria-label="fil d'Ariane" class="mb-3">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a th:href="@{/offres}">Offres</a></li>
                <li class="breadcrumb-item active" aria-current="page">Offre #<span th:text="${offre.id}">1</span></li>
            </ol>
        </nav>

        <div class="hh-card mb-4">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
                <div>
                    <h1 class="h3 mb-2" style="color: var(--hh-violet-950);" th:text="${offre.titre}">Developpeur Java</h1>
                    <p class="text-muted mb-0">
                        <span class="me-3" th:text="${offre.ville}">Casablanca</span>
                        <span class="badge bg-primary rounded-pill" th:text="${offre.typeContrat}">CDI</span>
                        <span class="ms-3" th:if="${offre.salaire != null}">
                            Salaire <span th:text="${#numbers.formatDecimal(offre.salaire, 0, 'POINT', 2, 'COMMA')}">12000</span>
                        </span>
                    </p>
                </div>
                <a class="hh-btn-primary" th:href="@{/offres/{id}/postuler(id=${offre.id})}">Postuler</a>
            </div>
            <hr class="my-4 opacity-25"/>
            <h2 class="h6 text-uppercase" style="color: var(--hh-violet-800);">Description</h2>
            <p class="text-muted mb-0" th:text="${offre.description}">
                Description de l'offre.
            </p>
        </div>
    </div>
</section>
</body>
</html>
