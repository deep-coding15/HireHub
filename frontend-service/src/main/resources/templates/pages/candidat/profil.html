<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Mon profil</title>
</head>
<body>
<section layout:fragment="content" class="page-inner">
    <div class="container" style="max-width: 560px;">
        <h1 class="page-hero-title">Mon profil</h1>
        <p class="page-hero-sub">Informations personnelles et CV par défaut (à synchroniser avec <code>auth-service</code> / <code>candidature-service</code>).</p>

        <form class="hh-card">
            <div class="mb-3">
                <label class="hh-form-label" for="nom">Nom complet</label>
                <input type="text" id="nom" class="form-control rounded-3 border-0 shadow-sm" value="Jean Dupont"/>
            </div>
            <div class="mb-3">
                <label class="hh-form-label" for="email">Email</label>
                <input type="email" id="email" class="form-control rounded-3 border-0 shadow-sm" value="jean.dupont@email.com"/>
            </div>
            <div class="mb-3">
                <label class="hh-form-label" for="tel">Téléphone</label>
                <input type="tel" id="tel" class="form-control rounded-3 border-0 shadow-sm" placeholder="+212 …"/>
            </div>
            <div class="mb-4">
                <label class="hh-form-label" for="cv">CV par défaut (PDF)</label>
                <input type="file" id="cv" class="form-control rounded-3 border-0 shadow-sm" accept=".pdf"/>
            </div>
            <button type="button" class="btn hh-btn-primary rounded-pill">Enregistrer</button>
        </form>
    </div>
</section>
</body>
</html>
