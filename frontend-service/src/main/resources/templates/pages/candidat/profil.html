<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Mon profil</title>
</head>
<body>
<section layout:fragment="content" class="page-inner">
    <div class="container" style="max-width: 640px;">

        <h1 class="page-hero-title">Mon profil</h1>
        <p class="page-hero-sub">Gérez vos informations personnelles.</p>

        <div class="alert alert-success border-0 shadow-sm"
             th:if="${profilSuccess}" th:text="${profilSuccess}"></div>
        <div class="alert alert-danger border-0 shadow-sm"
             th:if="${profilError}" th:text="${profilError}"></div>

        <form class="hh-card" method="POST" th:action="@{/candidat/profil}">
            <h2 class="h6 text-uppercase mb-3" style="color: var(--hh-violet-800);">
                Informations personnelles
            </h2>

            <!-- Nom complet (modifiable) -->
            <div class="mb-3">
                <label class="hh-form-label" for="fullName">Nom complet</label>
                <input type="text" id="fullName" name="fullName"
                       class="form-control rounded-3 border-0 shadow-sm"
                       th:value="${fullName}"
                       placeholder="Votre nom complet"
                       required maxlength="200"/>
            </div>

            <!-- Email (lecture seule — identifiant de connexion) -->
            <div class="mb-4">
                <label class="hh-form-label" for="email">Adresse email</label>
                <input type="email" id="email"
                       class="form-control rounded-3 border-0 shadow-sm bg-light"
                       th:value="${email}"
                       readonly/>
                <div class="form-text text-muted">
                    L'adresse email est votre identifiant de connexion et ne peut pas être modifiée ici.
                </div>
            </div>

            <button type="submit" class="btn hh-btn-primary rounded-pill">
                Enregistrer les modifications
            </button>
        </form>

        <!-- Bloc mot de passe -->
        <div class="hh-card mt-4">
            <h2 class="h6 text-uppercase mb-3" style="color: var(--hh-violet-800);">Sécurité</h2>
            <p class="text-muted small mb-3">
                Pour modifier votre mot de passe, utilisez la procédure de réinitialisation.
            </p>
            <a th:href="@{/forgot-password}" class="btn btn-outline-secondary rounded-pill btn-sm">
                Changer mon mot de passe
            </a>
        </div>

    </div>
</section>
</body>
</html>
