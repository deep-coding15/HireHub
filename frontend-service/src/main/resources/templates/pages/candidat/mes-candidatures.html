<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Mes candidatures</title>
</head>
<body>
<section layout:fragment="content" class="page-inner">
    <div class="container">
        <h1 class="page-hero-title">Mes candidatures</h1>
        <p class="page-hero-sub">Fil d’étapes par candidature — données mock.</p>

        <div class="hh-card mb-4">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <div>
                    <h2 class="h5 mb-0" style="color: var(--hh-violet-900);">Développeur Java / Spring</h2>
                    <small class="text-muted">Tétouan · CDI</small>
                </div>
                <span class="badge badge-statut-encours rounded-pill">En cours</span>
            </div>
            <div class="hh-timeline">
                <div class="hh-timeline-item">
                    <strong>Soumise</strong>
                    <div class="small text-muted">10/03/2026 — CV reçu</div>
                </div>
                <div class="hh-timeline-item">
                    <strong>En cours d’étude</strong>
                    <div class="small text-muted">12/03/2026 — équipe RH</div>
                </div>
                <div class="hh-timeline-item mb-0">
                    <strong>Entretien planifié</strong>
                    <div class="small text-muted">Voir <a th:href="@{/candidat/entretiens}">Mes entretiens</a></div>
                </div>
            </div>
        </div>

        <div class="hh-card">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-0">
                <div>
                    <h2 class="h5 mb-0" style="color: var(--hh-violet-900);">Stage PFE — Full-stack</h2>
                    <small class="text-muted">Rabat · Stage</small>
                </div>
                <span class="badge badge-statut-soumise rounded-pill">Soumise</span>
            </div>
        </div>
    </div>
</section>
</body>
</html>
