spring:
  application:
    name: email-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    username: hirehub
    password: hirehub
    virtual-host: /
    connection-timeout: 10000
    listener:
      simple:
        prefetch: 1
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    from: ${MAIL_FROM:noreply@hirehub.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  datasource:
    url: jdbc:postgresql://localhost:55432/hirehub_email
    username: hirehub
    password: hirehub
    driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
app:
  jwt:
    # Clé secrète générée aléatoirement (ici encodée en Base64 pour plus de propreté)
    secret-key: "dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1hbmQtbXVzdC1iZS1hdC1sZWFzdC0yNTYtYml0cw=="
    # Temps d'expiration en millisecondes (Exemple : 1 heure -> 60 * 60 * 1000)
    expiration-time: 3600000

# Configuration pour l'idempotence et le traitement des événements
notification:
  idempotence:
    enabled: true
    ttl-days: 30
  rabbitmq:
    max-retries: 3
    retry-delay-ms: 1000

server:
  port: ${SERVER_PORT:8093}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connect-timeout: 1000
        read-timeout: 5000
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 5
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
        register-health-indicator: true
    instances:
      auth-service:
        base-config: default
      offre-service:
        base-config: default
      candidature-service:
        base-config: default
      event-service:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 2
        wait-duration: 1000ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
    instances:
      auth-service:
        base-config: default
      offre-service:
        base-config: default
      candidature-service:
        base-config: default
      event-service:
        base-config: default
  bulkhead:
    instances:
      auth-service:
        max-concurrent-calls: 10
        max-wait-duration: 500ms
      offre-service:
        max-concurrent-calls: 5
        max-wait-duration: 500ms
      candidature-service:
        max-concurrent-calls: 8
        max-wait-duration: 500ms
      event-service:
        max-concurrent-calls: 5
        max-wait-duration: 500ms

management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus, circuitbreakers, circuitbreakerevents
