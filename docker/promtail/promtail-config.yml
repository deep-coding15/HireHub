server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: hirehub
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Garde uniquement les conteneurs HireHub
      - source_labels: [__meta_docker_container_name]
        regex: /hirehub-.*
        action: keep
      # Extrait le nom du service depuis le nom du conteneur (hirehub-<service>)
      - source_labels: [__meta_docker_container_name]
        regex: /hirehub-(.*)
        target_label: service
        replacement: '${1}'
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      # Parse le JSON produit par LogstashEncoder
      - json:
          expressions:
            level: level
            logger: logger_name
            correlationId: correlationId
            userId: userId
      # Seuls service + level deviennent des labels Loki (cardinalité faible)
      # correlationId/userId restent des champs JSON interrogeables via LogQL
      - labels:
          level:
