server:
  port: 8084
spring:
  application:
    name: event-service

  rabbitmq:
    host: localhost
    port: 5672
    username: hirehub
    password: hirehub
    virtual-host: /
    connection-timeout: 10000
    listener:
      simple:
        prefetch: 1
        default-requeue-rejected: true
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 1.0

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:55432}/hirehub_event
    username: ${DB_USERNAME:hirehub}
    password: ${DB_PASSWORD:hirehub}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate # flyway gère les migrations, pas besoin de laisser Hibernate créer ou mettre à jour la structure
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:lydivinemerveille.magnetsafack@etu.uae.ac.ma}
    password: ${MAIL_PASSWORD:kyqdslkemcrnbjzg}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
app:
  jwt:
    # Clé secrète générée aléatoirement (ici encodée en Base64 pour plus de propreté)
    secret-key: "dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1hbmQtbXVzdC1iZS1hdC1sZWFzdC0yNTYtYml0cw=="
    # Temps d'expiration en millisecondes (Exemple : 1 heure -> 60 * 60 * 1000)
    expiration-time: 3600000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

hirehub:
  jwt:
    secret: your-super-secret-key-change-me-in-production
    expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

