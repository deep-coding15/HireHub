apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: hirehub
type: Opaque
stringData:
  username: hirehub
  password: hirehub

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-pvc
  namespace: hirehub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: hirehub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:4.3-rc-management-alpine
          ports:
            - containerPort: 5672   # AMQP (messages)
            - containerPort: 15672  # interface web
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: password
            - name: RABBITMQ_DEFAULT_VHOST
              value: "/"
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-pvc

---
# Service interne : pour que les microservices envoient des messages
# Les services Spring Boot se connectent via "rabbitmq:5672"
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: hirehub
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672

---
# Service externe : pour accéder à l'interface web depuis ton navigateur
# http://$(minikube ip):30672
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-ui
  namespace: hirehub
spec:
  type: NodePort
  selector:
    app: rabbitmq
  ports:
    - port: 15672
      targetPort: 15672
      nodePort: 30672
