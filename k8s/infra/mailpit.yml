apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: hirehub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
        - name: mailpit
          image: axllent/mailpit:latest
          ports:
            - containerPort: 1025   # SMTP (reception des emails)
            - containerPort: 8025   # interface web

---
# Service interne : pour que les microservices envoient des emails
# Spring Boot se connecte via "mailpit:1025"
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: hirehub
spec:
  selector:
    app: mailpit
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: ui
      port: 8025
      targetPort: 8025

---
# Service externe : pour voir les emails dans le navigateur
# http://$(minikube ip):30025
apiVersion: v1
kind: Service
metadata:
  name: mailpit-ui
  namespace: hirehub
spec:
  type: NodePort
  selector:
    app: mailpit
  ports:
    - port: 8025
      targetPort: 8025
      nodePort: 30025
