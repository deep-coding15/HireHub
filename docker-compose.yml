services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    container_name: hirehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hirehub
      POSTGRES_PASSWORD: hirehub
    ports:
      - "55432:5432"
    volumes:
      - hirehub-pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hirehub -d hirehub_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: hirehub-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  rabbitmq:
    image: rabbitmq:4.3-rc-management-alpine
    container_name: hirehub-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: hirehub
      RABBITMQ_DEFAULT_PASS: hirehub
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"      # AMQP protocol
      - "15672:15672"    # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - hirehub-rabbitmq-data:/var/lib/rabbitmq
      - hirehub-rabbitmq-logs:/var/log/rabbitmq

  # ── Observabilité ────────────────────────────────────────────────────────────

  loki:
    image: grafana/loki:3.0.0
    container_name: hirehub-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.0.0
    container_name: hirehub-promtail
    restart: unless-stopped
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.0.0
    container_name: hirehub-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: hirehub
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  hirehub-pg-data:
  hirehub-rabbitmq-data:
  hirehub-rabbitmq-logs:
  loki-data:
  grafana-data:

# ── Réseau ───────────────────────────────────────────────────────────────────

networks:
  default:
    name: hirehub-network
    driver: bridge
