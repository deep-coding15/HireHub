services:
  postgres:
    image: postgres:17-alpine
    container_name: hirehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hirehub
      POSTGRES_PASSWORD: hirehub
    ports:
      - "5432:5432"
    volumes:
      - hirehub-pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hirehub -d hirehub_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: hirehub-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  hirehub-pg-data:
