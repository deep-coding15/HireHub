server:
  port: 8084
spring:
  application:
    name: notification-service
  rabbitmq:
    host: localhost
    port: 5672
    username: hirehub
    password: hirehub
    virtual-host: /
    connection-timeout: 10000
    listener:
      simple:
        prefetch: 1
        default-requeue-rejected: true
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 1.0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


