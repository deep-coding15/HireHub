spring:
  application:
    name: notification-service
  profiles:
    active: docker
  mail:
    host: ${MAIL_HOST:mailpit}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:noreply@hirehub.com}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/hirehub_notification
    username: ${DB_USERNAME:hirehub}
    password: ${DB_PASSWORD:hirehub}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:hirehub}
    password: ${RABBITMQ_PASSWORD:hirehub}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-timeout: 10000

# Eureka configuration
eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:eureka-server}:${EUREKA_PORT:8761}/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: ${HOSTNAME:localhost}
    prefer-ip-address: true

# Actuator configuration for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Configuration pour l'idempotence et le traitement des événements
notification:
  idempotence:
    enabled: true
    ttl-days: 30
  rabbitmq:
    max-retries: 3
    retry-delay-ms: 1000

logging:
  level:
    root: INFO
    com.hirehub: DEBUG
    org.springframework.amqp: INFO
  format: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

