server:
  port: 8083

spring:
  application:
    name: candidature-service
  profiles:
    active: dev

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:55432/hirehub_candidature
    username: hirehub
    password: hirehub
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  # RabbitMQ Configuration

  rabbitmq:
    host: localhost
    port: 5672
    username: hirehub
    password: hirehub

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    # Force Eureka to register this service with its IP address instead of
    # the raw machine/container hostname (e.g. "deep_coding15").
    # Hostnames containing underscores are rejected by java.net.URI (RFC 3986)
    # and cause an IllegalStateException in Spring Cloud LoadBalancer.
    prefer-ip-address: true

hirehub:
  jwt:
    secret: ${HIREHUB_JWT_SECRET:hirehub-local-dev-jwt-secret-change-me-32b}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    com.hirehub.candidature: INFO
    org.hibernate.SQL: DEBUG
