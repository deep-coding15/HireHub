server:
  port: 8083

spring:
  mvc:
    favicon:
      enabled: false
  application:
    name: candidature-service
  profiles:
    active: sandbox

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:55432/hirehub_candidature
    username: hirehub
    password: hirehub
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

  # RabbitMQ Configuration

  rabbitmq:
    host: localhost
    port: 5672
    username: hirehub
    password: hirehub

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    # Force Eureka to register this service with its IP address instead of
    # the raw machine/container hostname (e.g. "deep_coding15").
    # Hostnames containing underscores are rejected by java.net.URI (RFC 3986)
    # and cause an IllegalStateException in Spring Cloud LoadBalancer.
    prefer-ip-address: true

hirehub:
  jwt:
    secret: ${HIREHUB_JWT_SECRET:hirehub-local-dev-jwt-secret-change-me-32b}
app:
  jwt:
    # Clé secrète générée aléatoirement (ici encodée en Base64 pour plus de propreté)
    secret-key: "dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1hbmQtbXVzdC1iZS1hdC1sZWFzdC0yNTYtYml0cw=="
    # Temps d'expiration en millisecondes (Exemple : 1 heure -> 60 * 60 * 1000)
    expiration-time: 3600000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

feign:
  client:
    config:
      default:
        connect-timeout: 1000
        read-timeout: 5000
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      offre-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 5
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
        register-health-indicator: true
  retry:
    instances:
      offre-service:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
  bulkhead:
    instances:
      offre-service:
        max-concurrent-calls: 5
        max-wait-duration: 500ms

management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus, circuitbreakers, circuitbreakerevents

logging:
  level:
    com.hirehub.candidature: INFO
    org.hibernate.SQL: DEBUG
